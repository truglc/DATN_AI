<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>AI Video Processing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            border-radius: 15px;
        }

        .video-box {
            background: black;
            border-radius: 10px;
        }

        .progress {
            height: 25px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h2 class="text-center mb-4">🚀 AI Video Processing (YOLO + DeepSORT)</h2>

        <div class="row g-4">

            <!-- UPLOAD -->
            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h5>📤 Upload Video</h5>

                    <input type="file" id="file" class="form-control mb-3">

                    <button class="btn btn-primary w-100" onclick="upload()">
                        Upload
                    </button>

                    <div id="uploadStatus" class="mt-3 text-success"></div>
                </div>
            </div>

            <!-- PROCESS -->
            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h5>⚙️ Process</h5>

                    <button class="btn btn-warning w-100" onclick="processVideo()">
                        Run YOLO + DeepSORT
                    </button>

                    <div class="progress mt-3">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                            style="width: 0%">0%</div>
                    </div>

                    <div id="processStatus" class="mt-3 text-info"></div>
                </div>
            </div>

            <!-- RESULT -->
            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h5>📥 Result</h5>

                    <button class="btn btn-success w-100 mb-3" onclick="loadResult()">
                        Load Result
                    </button>

                    <a id="downloadLink" class="btn btn-outline-dark w-100 d-none" download>
                        ⬇ Download Video
                    </a>
                </div>
            </div>

        </div>

        <!-- VIDEO DISPLAY -->
        <div class="row mt-5">
            <div class="col-md-6">
                <h5>📹 Original Video</h5>
                <video id="originalVideo" class="w-100 video-box" controls></video>
            </div>

            <div class="col-md-6">
                <h5>🤖 Processed Video</h5>
                <video id="resultVideo" class="w-100 video-box" controls></video>
            </div>
        </div>

    </div>

    <script>
        let videoId = null;

        // =====================
        // UPLOAD
        // =====================
        async function upload() {
            let fileInput = document.getElementById("file");

            if (!fileInput.files.length) {
                alert("Chọn video trước!");
                return;
            }

            let formData = new FormData();
            formData.append("file", fileInput.files[0]);

            let res = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            let data = await res.json();
            videoId = data.video_id;

            document.getElementById("uploadStatus").innerText =
                "✔ Upload thành công: " + videoId;

            // preview video gốc
            document.getElementById("originalVideo").src =
                URL.createObjectURL(fileInput.files[0]);
        }

        // =====================
        // PROCESS
        // =====================
        async function processVideo() {
            if (!videoId) {
                alert("Upload trước!");
                return;
            }

            let progressBar = document.getElementById("progressBar");
            let status = document.getElementById("processStatus");

            progressBar.style.width = "10%";
            progressBar.innerText = "10%";
            status.innerText = "Đang xử lý video...";

            let interval = setInterval(() => {
                let current = parseInt(progressBar.style.width);
                if (current < 90) {
                    current += 10;
                    progressBar.style.width = current + "%";
                    progressBar.innerText = current + "%";
                }
            }, 500);

            let res = await fetch(`/process/${videoId}`, {
                method: "POST"
            });

            let data = await res.json();

            clearInterval(interval);

            progressBar.style.width = "100%";
            progressBar.innerText = "100%";

            status.innerText = "✔ Xử lý xong!";
            window.resultUrl = data.result_url;
        }

        // =====================
        // LOAD RESULT
        // =====================
        function loadResult() {
            if (!window.resultUrl) {
                alert("Chưa xử lý!");
                return;
            }

            let video = document.getElementById("resultVideo");
            video.src = window.resultUrl;

            let download = document.getElementById("downloadLink");
            download.href = window.resultUrl;
            download.classList.remove("d-none");
        }
    </script>

</body>

</html>
